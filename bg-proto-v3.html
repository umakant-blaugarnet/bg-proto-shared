document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }

      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.

            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

F, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"fdf78ebe-28a9-4879-bc3a-b93fc2b08ac6\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"9d0fbfe4-3f97-4005-a26f-cc71cae4f547\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"8c9c2470-81b1-4479-85d8-cb0229a7ad9d\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"24c2713c-ffea-4a5e-adda-26e79840783b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"98e46436-33d8-42d9-8220-7ebc23a01e0c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Blau — Color\n   ------------------------------------------------------------\n   Adopts the Geist 10-scale model. Two background colors plus a\n   set of 10-step scales. Each scale position carries a fixed\n   semantic role (mirroring Geist):\n\n     1–3  Component backgrounds   (1 default · 2 hover · 3 active)\n     4–6  Borders                 (4 default · 5 hover · 6 active)\n     7–8  High-contrast bg        (7 default · 8 hover)\n     9–10 Text & icons            (9 secondary · 10 primary)\n\n   Gray is the neutral. Blau is the brand accent. Red / Amber /\n   Green are the functional status scales. Garnet & Purple are\n   brand placeholders (held for later; not yet wired to anything).\n   ============================================================ */\n\n:root {\n  /* ===== Backgrounds =====================================\n     Two backgrounds for pages & components. Use Background 1 in\n     most instances — especially when colour sits on top of it.\n     Background 2 is for subtle, secondary backgrounds, sparingly. */\n  --bg-1: #ffffff;\n  --bg-2: #fafbfc;\n\n  /* ===== Gray — the neutral scale (1 → 10) =============== */\n  --gray-1:  #f5f6f8;\n  --gray-2:  #edeff2;\n  --gray-3:  #e5e8ed;\n  --gray-4:  #dcdfe5;\n  --gray-5:  #c7ccd4;\n  --gray-6:  #9ba2ad;\n  --gray-7:  #6f7683;\n  --gray-8:  #4c535f;\n  --gray-9:  #292e37;\n  --gray-10: #0b0d12;\n\n  /* ===== Blau — the brand accent (1 → 10) ===============\n     Anchors: Tint=1 · Soft=4 · Blau=8 · Hover=9 · Deep=10 */\n  --blau-1:  #eef3fe;\n  --blau-2:  #dfe8fd;\n  --blau-3:  #d1ddfc;\n  --blau-4:  #c2d2fb;\n  --blau-5:  #a7bcf9;\n  --blau-6:  #8ca7f6;\n  --blau-7:  #7191f4;\n  --blau-8:  #567bf1;\n  --blau-9:  #3f5fd6;\n  --blau-10: #2f489f;\n\n  /* ===== Functional scales — Red / Amber / Green ========= */\n  --red-1:  #faebeb;  --red-2:  #f3d3d4;  --red-3:  #edbbbe;  --red-4:  #e6a3a7;  --red-5:  #df878c;\n  --red-6:  #d76b71;  --red-7:  #d04e56;  --red-8:  #c8323b;  --red-9:  #a42930;  --red-10: #7c1f25;\n\n  --amber-1:  #f9f2e6;  --amber-2:  #f3e3c9;  --amber-3:  #ecd4ad;  --amber-4:  #e6c590;  --amber-5:  #deb36e;\n  --amber-6:  #d7a14d;  --amber-7:  #cf8f2b;  --amber-8:  #c77d09;  --amber-9:  #a36707;  --amber-10: #7b4e06;\n\n  --green-1:  #e9f3ee;  --green-2:  #cfe5da;  --green-3:  #b4d8c5;  --green-4:  #9acab1;  --green-5:  #7bba99;\n  --green-6:  #5daa82;  --green-7:  #3e9a6a;  --green-8:  #1f8a52;  --green-9:  #197143;  --green-10: #135633;\n\n  /* ===== Brand placeholders — Garnet / Purple ===========\n     Core (8) = Garnet #a61f3f · Purple #69259c. Held for later. */\n  --garnet-1:  #f6e9ec;  --garnet-2:  #eccfd6;  --garnet-3:  #e1b4bf;  --garnet-4:  #d79aa9;  --garnet-5:  #cb7b8f;\n  --garnet-6:  #bf5d74;  --garnet-7:  #b23e5a;  --garnet-8:  #a61f3f;  --garnet-9:  #881934;  --garnet-10: #671327;\n\n  --purple-1:  #f0e9f5;  --purple-2:  #dfd0e9;  --purple-3:  #cdb6de;  --purple-4:  #bc9dd2;  --purple-5:  #a77fc5;\n  --purple-6:  #9361b7;  --purple-7:  #7e43aa;  --purple-8:  #69259c;  --purple-9:  #561e80;  --purple-10: #411761;\n\n  /* ============================================================\n     BRAND CORE ALIASES — names the component bundle reads.\n     Sourced from the scales so there is one source of truth.\n     ============================================================ */\n  --blau:         var(--blau-8);   /* THE brand accent */\n  --blau-bright:  var(--blau-9);   /* primary :hover  */\n  --blau-deep:    var(--blau-10);  /* primary :active */\n  --blau-100:     var(--blau-3);   /* light tints — meters, fills, ramps */\n  --blau-200:     var(--blau-4);\n  --blau-300:     var(--blau-5);\n\n  /* Garnet — BRAND accent (#a61f3f). A brand colour, NEVER danger.\n     Decoupled from red so the brand is never read as a negative signal. */\n  --garnet:        var(--garnet-8);\n  --garnet-bright: var(--garnet-7);\n  --garnet-deep:   var(--garnet-10);\n\n  /* Danger — semantic RED. The bundle's danger button + status read these. */\n  --danger:        var(--red-8);\n  --danger-bright: var(--red-9);\n  --danger-deep:   var(--red-10);\n\n  /* Purple slate — the bundle's demoted `purple` tone (neutral) */\n  --purple:        #5b6072;\n  --purple-bright: #6b7180;\n  --purple-deep:   #44485a;\n\n  /* ============================================================\n     LEGACY NEUTRAL ALIASES (component-bundle + components.css).\n     Kept LITERAL so the shipped bundle re-skins untouched. Author\n     NEW work against --bg-1/2 and --gray-1..10 above. The legacy\n     0–1000 ramp is the prior 11-step scale; the canonical scale\n     is now Background 1/2 + Gray 1–10.\n     ============================================================ */\n  --n-0:    #ffffff;\n  --n-50:   #fafbfc;\n  --n-100:  #f5f6f8;\n  --n-150:  #eef0f3;\n  --n-200:  #e7e9ee;\n  --n-300:  #e0e3e8;\n  --n-400:  #d4d8df;\n  --n-500:  #b6bcc6;\n  --n-600:  #868d99;\n  --n-700:  #646b78;\n  --n-800:  #454c58;\n  --n-900:  #252a33;\n  --n-1000: #0b0d12;\n  --n-1:  var(--n-50);  --n-2:  var(--n-100); --n-3:  var(--n-150); --n-4:  var(--n-200);\n  --n-5:  var(--n-300); --n-6:  var(--n-400); --n-7:  var(--n-500); --n-8:  var(--n-600);\n  --n-9:  var(--n-700); --n-10: var(--n-800); --n-11: var(--n-900); --n-12: var(--n-1000);\n\n  /* --- Hairline borders (dark-on-light, low alpha) ---------- */\n  --border-faint:  rgba(11,13,18,0.06);\n  --border:        rgba(11,13,18,0.10);\n  --border-strong: rgba(11,13,18,0.16);\n  --border-focus:  var(--gray-7);   /* neutral-grey focus is the default; Blau reserved for primary actions & selection */\n\n  /* ============================================================\n     SEMANTIC ALIASES — author UI against these\n     ============================================================ */\n\n  /* Surfaces */\n  --surface-canvas:   var(--bg-2);\n  --surface:          var(--bg-1);\n  --surface-elevated: var(--bg-1);\n  --surface-overlay:  var(--bg-1);\n  --surface-hover:    rgba(11,13,18,0.04);\n  --surface-active:   rgba(11,13,18,0.07);\n  --surface-sunken:   var(--gray-1);\n\n  /* Text & icons (Color 9 = secondary, 10 = primary; 7–8 extend the scale) */\n  --text-primary:   var(--gray-10);\n  --text-secondary: var(--gray-8);\n  --text-muted:     var(--gray-7);\n  --text-faint:     var(--gray-6);\n  --text-disabled:  var(--gray-5);\n  --text-on-accent: #ffffff;\n\n  /* Blau — the one brand accent */\n  --accent-blau:      var(--blau-8);\n  --accent-blau-text: #3a5fd9;   /* slightly deeper for legibility on white */\n  --accent-blau-fill: var(--blau-8);\n  --accent-blau-soft: rgba(86,123,241,0.12);\n  --accent-blau-line: rgba(86,123,241,0.34);\n\n  /* Garnet — BRAND accent (#a61f3f). Decoupled from danger red.\n     Used by the bundle's garnet badge tone / Card+Dialog garnet accent / actor avatars. */\n  --accent-garnet:      var(--garnet-8);\n  --accent-garnet-text: var(--garnet-9);\n  --accent-garnet-fill: var(--garnet-8);\n  --accent-garnet-soft: rgba(166,31,63,0.10);\n  --accent-garnet-line: rgba(166,31,63,0.30);\n\n  /* Danger — pure semantic RED. The bundle's danger button + error states read these. */\n  --accent-danger:      var(--red-8);\n  --accent-danger-text: #b3232c;\n  --accent-danger-fill: var(--red-8);\n  --accent-danger-soft: rgba(200,50,59,0.10);\n  --accent-danger-line: rgba(200,50,59,0.34);\n\n  /* Purple — demoted neutral slate */\n  --accent-purple:      var(--purple);\n  --accent-purple-soft: rgba(91,96,114,0.10);\n  --accent-purple-line: rgba(91,96,114,0.34);\n\n  /* Status — functional scales */\n  --status-success:      var(--green-8);\n  --status-success-soft: rgba(31,138,82,0.10);\n  --status-warning:      var(--amber-9);\n  --status-warning-soft: rgba(199,125,9,0.12);\n  --status-danger:       var(--red-8);\n  --status-danger-soft:  var(--accent-danger-soft);\n  --status-info:         var(--blau-8);\n  --status-info-soft:    var(--accent-blau-soft);\n\n  /* Functional */\n  --focus-ring:   rgba(86,123,241,0.45);\n  --selection-bg: rgba(86,123,241,0.18);\n  --scrim:        rgba(248,249,251,0.64);\n}\n\n::selection { background: var(--selection-bg); color: var(--text-primary); }\n<\u002Fstyle>\n<style>/* ============================================================\n   Blau — Spacing, sizing, radius, elevation, motion\n   ------------------------------------------------------------\n   Density preserved (Linear-grade, 4px base, ~32px rows).\n   Elevation rewritten for LIGHT: soft dark-on-light shadows\n   instead of dark-mode luminance steps.\n   ============================================================ */\n\n:root {\n  /* --- Spacing scale (4px base) --------------------------- */\n  --space-0:  0px;\n  --space-1:  2px;\n  --space-2:  4px;\n  --space-3:  6px;\n  --space-4:  8px;\n  --space-5:  12px;\n  --space-6:  16px;\n  --space-7:  20px;\n  --space-8:  24px;\n  --space-9:  32px;\n  --space-10: 40px;\n  --space-11: 48px;\n  --space-12: 64px;\n\n  /* --- Control & row heights (the density contract) ------- */\n  --row-h:        32px;\n  --row-h-sm:     28px;\n  --control-h:    28px;\n  --control-h-sm: 24px;\n  --control-h-lg: 34px;\n  --icon-sm:      14px;\n  --icon:         16px;\n  --icon-lg:      20px;\n\n  /* --- Radius -------------------------------------------- */\n  --radius-sm:  4px;\n  --radius:     6px;\n  --radius-md:  8px;\n  --radius-lg:  12px;\n  --radius-pill: 999px;\n\n  /* Button radius — the ONE switch. Rounded 6px (default SaaS) now;\n     set to var(--radius-pill) to return every button to the pill shape. */\n  --radius-button: var(--radius);\n\n  /* Button sizing — single source of truth (md is the default).\n     The DS Button (.bg-btn) and the prototype's .act both resolve\n     to these, so the two can no longer drift in size. */\n  --btn-h:    var(--control-h);   /* 28px */\n  --btn-px:   var(--space-5);     /* 12px */\n  --btn-font: var(--text-13);     /* 13px — .act was 12px, the drift you caught */\n\n  /* --- Hairline width ------------------------------------ */\n  --hairline: 1px;\n\n  /* --- Elevation (light: soft dark-on-light shadows) ----- */\n  --shadow-sm:  0 1px 2px rgba(17,20,28,0.06);\n  --shadow:     0 2px 8px rgba(17,20,28,0.08);\n  --shadow-md:  0 8px 24px rgba(17,20,28,0.10);\n  --shadow-lg:  0 16px 48px rgba(17,20,28,0.14);\n  --ring-overlay: inset 0 0 0 1px var(--border);\n\n  /* --- Materials — elevation presets (Geist model) -----------\n     Two bands: SURFACE sits on the page (subtle, low shadow);\n     FLOATING sits above it (real lift). Apply the matching pair\n     of radius + shadow when building, so elevation is grounded\n     in the system instead of hand-rolled per surface. */\n  /* Surface · on the page */\n  --material-base-radius:   6px;   --material-base-shadow:   none;\n  --material-small-radius:  6px;   --material-small-shadow:  0 1px 2px rgba(17,20,28,0.04);\n  --material-medium-radius: 12px;  --material-medium-shadow: 0 2px 5px rgba(17,20,28,0.05);\n  --material-large-radius:  12px;  --material-large-shadow:  0 3px 8px rgba(17,20,28,0.06);\n  /* Floating · above the page */\n  --material-tooltip-radius:    6px;   --material-tooltip-shadow:    0 1px 4px rgba(17,20,28,0.06);\n  --material-menu-radius:       12px;  --material-menu-shadow:       0 6px 16px rgba(17,20,28,0.08);\n  --material-modal-radius:      12px;  --material-modal-shadow:      0 12px 28px rgba(17,20,28,0.10);\n  --material-fullscreen-radius: 16px;  --material-fullscreen-shadow: 0 18px 44px rgba(17,20,28,0.12);\n\n  /* --- Layout rails -------------------------------------- */\n  --sidebar-w:    248px;\n  --rail-w:       52px;\n  --panel-w:      300px;\n  --content-max:  720px;\n  --topbar-h:     44px;\n\n  /* --- Motion (quiet, governed; no bounce) --------------- */\n  --ease:        cubic-bezier(0.2, 0, 0, 1);\n  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);\n  --dur-fast:    90ms;\n  --dur:         140ms;\n  --dur-slow:    220ms;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Blau — Typography\n   ------------------------------------------------------------\n   Inter for the entire application UI & body copy.\n   JetBrains Mono for data, metadata, IDs, ledgers, system logs\n   (a sharp 14px). Hierarchy via weight + space, not size jumps.\n   ============================================================ */\n\n:root {\n  --font-sans:  \"Inter\", ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif;\n  --font-mono:  \"JetBrains Mono\", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;\n  /* Serif ceremony is retired in the clean system — fall back to sans. */\n  --font-serif: var(--font-sans);\n\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;   /* crisp section/heading emphasis */\n\n  /* Size scale (kept tight; +14 for mono data) */\n  --text-11: 11px;   /* eyebrows, table caps, tags */\n  --text-12: 12px;   /* dense rows, secondary labels */\n  --text-13: 13px;   /* default body / UI text */\n  --text-14: 14px;   /* mono data layout (ledgers, IDs, logs) */\n  --text-15: 15px;   /* emphasis, section titles */\n  --text-16: 16px;   /* dialog / modal titles, section headings (Geist base) */\n  --text-18: 18px;   /* card / panel titles */\n  --text-20: 20px;   /* sub-section headings */\n  --text-24: 24px;   /* page & dialog titles */\n  --text-32: 32px;   /* hero / large page titles */\n\n  --leading-11: 16px;\n  --leading-12: 16px;\n  --leading-13: 20px;\n  --leading-14: 20px;\n  --leading-15: 22px;\n  --leading-16: 24px;\n  --leading-18: 26px;\n  --leading-20: 26px;\n  --leading-24: 30px;\n  --leading-32: 38px;\n\n  /* Tracking — Inter sits well a touch tight */\n  --tracking-tight:  -0.02em;   /* 24px titles */\n  --tracking-normal: -0.006em;\n  --tracking-wide:   0.06em;     /* 11px ALL-CAPS eyebrows */\n  --tracking-mono:   0;\n\n  --serif-leading: 1.2;\n  --serif-tracking: 0;\n}\n\n/* ---- Base element defaults ---- */\nhtml { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }\nbody {\n  font-family: var(--font-sans);\n  font-size: var(--text-13);\n  line-height: var(--leading-13);\n  font-weight: var(--weight-regular);\n  color: var(--text-primary);\n  letter-spacing: var(--tracking-normal);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Blau — Component variant extensions\n   ------------------------------------------------------------\n   New variant classes layered on the shipped bundle. The Button\n   component renders class `bg-btn--{variant}` from its `variant`\n   prop, so a new variant needs only a CSS rule here — no edits\n   to the component bundle itself.\n   ============================================================ */\n\n/* Rewrite — a ROUTING action (returns work to the actors to be\n   redrafted), not a destructive deletion. Strong neutral outline +\n   Blau text. Carries clear interactive weight to guide the user\n   without firing a false danger signal. Use in place of the solid-red\n   `danger` variant for rewrite / route / hand-off intents. Reserve\n   `danger` for truly destructive actions only. */\nbutton.bg-btn--rewrite{\n  background: transparent;\n  color: var(--accent-blau);\n  border-color: var(--n-600);   /* crisp neutral outline — matches the modal Rewrite */\n}\nbutton.bg-btn--rewrite:not([disabled]):hover{\n  background: var(--surface-hover);\n  border-color: var(--n-700);\n}\nbutton.bg-btn--rewrite:not([disabled]):active{\n  background: var(--surface-active);\n}\n\n/* ============================================================\n   Global button radius — driven by the single --radius-button\n   token (pill). Higher-specificity selectors (button.x) win over\n   the bundle's runtime-injected .bg-btn rule without !important.\n   Revert everything by setting --radius-button: var(--radius).\n   ============================================================ */\nbutton.bg-btn { border-radius: var(--radius-button); }\nbutton.act    { border-radius: var(--radius-button); }\n\n/* ============================================================\n   Neutral focus as the system default — Blau is reserved for\n   primary actions & selection, not every focused field (Geist\n   model). The grey focus border comes from --border-focus; these\n   rules swap the bundle's blue focus ring for a faint neutral one.\n   Error fields keep their red ring.\n   ============================================================ */\n.bg-input.bg-input:focus-within:not(.bg-input--error) { box-shadow: 0 0 0 3px rgba(11,13,18,0.05); }\n.bg-select__wrap.bg-select__wrap:focus-within { box-shadow: 0 0 0 3px rgba(11,13,18,0.05); }\n<\u002Fstyle>\n<script src=\"57d56c17-0267-47eb-bb3a-9077a08915b2\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box;}\n  body{margin:0;background:#21263d;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}\n  .doc-scroll::-webkit-scrollbar{width:10px;}\n  .doc-scroll::-webkit-scrollbar-thumb{background:rgba(11,13,18,0.14);border-radius:6px;border:3px solid transparent;background-clip:content-box;}\n  .doc-scroll::-webkit-scrollbar-track{background:transparent;}\n  .nav-scroll::-webkit-scrollbar{width:0;height:0;}\n  .nav-scroll{scrollbar-width:none;}\n  @keyframes dsPulse{0%,100%{opacity:1;}50%{opacity:0.35;}}\n  .ds-snip:hover .ds-hoverbg{background:var(--gray-1);}\n  /* BDS button base + variants (bundle injects these only on React mount; declared here so raw .bg-btn markup renders) */\n  .bg-btn{font-family:var(--font-sans);font-size:var(--text-13);font-weight:var(--weight-medium);line-height:1;height:var(--control-h);display:inline-flex;align-items:center;justify-content:center;gap:var(--space-3);padding:0 var(--space-5);border-radius:var(--radius-button);border:var(--hairline) solid transparent;white-space:nowrap;cursor:pointer;user-select:none;transition:background .15s ease,border-color .15s ease,color .15s ease;}\n  .bg-btn svg{width:var(--icon-sm);height:var(--icon-sm);flex:none;}\n  .bg-btn--sm{height:var(--control-h-sm);font-size:var(--text-12);padding:0 var(--space-4);}\n  .bg-btn--lg{height:var(--control-h-lg);p }\n  .wb-btn{font-family:'Inter',sans-serif;cursor:pointer;transition:background .14s ease,color .14s ease,box-shadow .14s ease;}\n  .wb-ghost{background:transparent;color:var(--text-secondary);border:1px solid transparent;}\n  .wb-ghost:hover{background:var(--surface-hover);color:var(--text-primary);}\n  .wb-secondary{background:var(--surface-elevated);color:var(--text-primary);border:1px solid var(--border-strong);}\n  .wb-secondary:hover{background:var(--n-5);}\n  .wb-primary{background:var(--accent-blau-fill);color:#fff;border:1px solid transparent;}\n  .wb-primary:hover{background:var(--blau-bright);}\n  .wb-ta{font-family:'Inter',sans-serif;}\n  .wb-ta::placeholder{color:var(--gray-6);}\n  .wb-ta:focus{outline:none;}\n  .wb-opt{font-family:'Inter',sans-serif;cursor:pointer;transition:box-shadow .14s ease,background .14s ease;text-align:left;}\n  .rail-seg{width:30px;height:26px;display:flex;align-items:center;justify-content:center;border:none;border-radius:6px;background:transparent;color:var(--gray-6);cursor:pointer;transition:background .12s,color .12s;}\n  .rail-seg[data-active=\"true\"]{background:var(--gray-4);color:var(--gray-8);box-shadow:0 1px 2px rgba(11,13,18,0.10);}\n  .rail-seg[data-active=\"false\"]{cursor:default;}\n  .rail-seg[data-active=\"false\"]:hover{color:var(--gray-7);}\n  #ix-tip{position:fixed;z-index:9999;pointer-events:none;max-width:320px;padding:6px 10px;border:1px solid var(--border-faint);border-radius:var(--material-tooltip-radius);background:var(--surface);color:var(--text-secondary);font-family:'Inter',sans-serif;font-size:13px;line-height:1.45;box-shadow:var(--material-tooltip-shadow);opacity:0;transform:translateY(-2px);transition:opacity .12s ease,transform .12s ease;}\n  #ix-tip.on{opacity:1;transform:translateY(0);}\n  .bg-dialog__scrim{position:fixed;inset:0;background:var(--scrim,rgba(17,20,28,0.5));z-index:100;display:flex;align-items:center;justify-content:center;padding:var(--space-8);}\n  .bg-dialog{width:100%;max-width:440px;background:var(--surface-overlay);border:var(--hairline) solid var(--border-strong);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden;}\n  .bg-dialog__head{display:flex;align-items:flex-start;gap:var(--space-4);padding:var(--space-6) var(--space-6) var(--space-4);}\n  .bg-dialog__accent{width:3px;height:18px;border-radius:2px;margin-top:2px;flex:none;}\n  .bg-dialog__title{font-size:var(--text-15);font-weight:var(--weight-medium);color:var(--text-primary);}\n  .bg-dialog__desc{font-size:var(--text-13);color:var(--text-secondary);line-height:var(--leading-13);margin-top:var(--space-3);}\n  .bg-dialog__body{padding:0 var(--space-6) var(--space-2);}\n  .bg-dialog__foot{display:flex;justify-content:flex-end;gap:var(--space-4);padding:var(--space-5) var(--space-6);border-top:var(--hairline) solid var(--border);margin-top:var(--space-5);}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"width:100%;height:100vh;max-height:940px;overflow:hidden;\">\n<div style=\"width:100%;height:100%;background:#2B304D;display:flex;flex-direction:column;overflow:hidden;position:relative;\">\n\n  <div style=\"height:13px;flex:none;\"><\u002Fdiv>\n\n  <div style=\"flex:1;display:flex;min-height:0;\">\n\n    <!-- ===== THE L — left menu on chrome ===== -->\n    <div class=\"nav-l slate-l {{ navColClass }}\" onclick=\"{{ onNavClick }}\" style=\"flex:none;display:flex;flex-direction:column;min-height:0;padding:4px 12px 14px;\">\n      <!-- collapse toggle (top, mirrors the right rail) -->\n      <div class=\"nav-row\" style=\"display:flex;align-items:center;gap:10px;height:44px;padding:0 8px;border-radius:9px;\">\n        <span class=\"nav-brand\" style=\"width:26px;height:26px;border-radius:7px;background:var(--blau-10);color:var(--bg-1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex:none;\">HB<\u002Fspan>\n        <span class=\"nav-hide\" style=\"font-size:13.5px;font-weight:600;color:var(--gray-10);white-space:nowr \n            <\u002Faside>\n\n            <div style=\"flex:1;min-width:0;display:flex;justify-content:center;padding:0 40px;\">\n            <!-- the white document — print-layout stacked pages -->\n            <sc-if value=\"{{ isDocument }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"width:100%;max-width:820px;border-radius:4px;box-shadow:var(--material-modal-shadow);padding:46px 30px 72px;display:flex;flex-direction:column;background:var(--bg-1);\">\n              <!-- ===== MASTHEAD ===== -->\n              <div style=\"margin:0 0 2px;font-size:11px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--blau-10);font-family:var(--font-mono);\">Product Requirements · Checkout Rework<\u002Fdiv>\n              <!-- ===== P-0 Preamble ===== -->\n              <div style=\"display:flex;align-items:center;gap:11px;margin:30px 0 6px;\">\n                <span id=\"sec-0\" style=\"font-size:13px;font-weight:700;color:var(--blau-10);font-family:var(--font-mono);\">P-0<\u002Fspan>\n                <span style=\"font-size:16px;font-weight:600;color:var(--gray-10);letter-spacing:-0.01em;\">Preamble<\u002Fspan>\n                <span style=\"flex:1;height:1px;background:var(--border);\"><\u002Fspan>\n              <\u002Fdiv>\n              <!-- P-0 preamble (living) -->\n              <div id=\"snip-p0\" onclick=\"{{ pick_p0 }}\" style=\"position:relative;margin:0;padding:12px 0;cursor:pointer;\">\n                <sc-if value=\"{{ focus_p0 }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"position:absolute;left:-30px;right:-30px;top:1px;bottom:1px;background:var(--blau-1);opacity:0.5;\"><\u002Fdiv><\u002Fsc-if>\n                <sc-if value=\"{{ focus_p0 }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"position:absolute;left:-30px;top:5px;bottom:5px;width:3px;border-radius:0 2px 2px 0;background:{{ barCol_p0 }};\"><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ hasDot_p0 }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"position:absolute;left:-25px;top:15px;width:7px;height:7px;border-radius:50%;background:{{ dotCol_p0 }};\"><\u002Fdiv><\u002Fsc-if>\n                <p style=\"position:relative;margin:0;font-size:14.5px;line-height:1.75;color:var(--gray-8);font-style:italic;text-wrap:pretty;\">This PRD covers the product features of the revamped checkout experience delivered under the Storefront Replatform program's Checkout Rework project. It predominantly covers the guest and returning-shopper purchase paths, express checkout, stored-payment consent, regional price display, and the returns and refunds flow, deriving its requirements from the settled decisions of the Checkout BRD. The work is expected to lift checkout conversion on repeat purchases, reduce payment-failure abandonment, and bring refund handling within the platform's committed disclosure rules.<\u002Fp>\n                <div style=\"position:relative;display:flex;align-items:center;flex-wrap:wrap;gap:18px;row-gap:10px;margin-top:14px;min-height:30px;\"><span style=\"display:inline-flex;align-items:baseline;gap:6px;white-space:nowrap;\"><span style=\"font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--gray-5);\">Source<\u002Fspan><span style=\"font-size:11px;color:var(--gray-8);font-family:var(--font-mono);\">{{ metaSrc_p0 }}<\u002Fspan><\u002Fspan><span style=\"display:inline-flex;align-items:baseline;gap:6px;white-space:nowrap;\"><span style=\"font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--gray-5);\">Date Created<\u002Fspan><span style=\"font-size:11px;color:var(--gray-8);font-family:var(--font-mono);\">{{ metaDate_p0 }}<\u002Fspan><\u002Fspan><span style=\"display:inline-flex;align-items:baseline;gap:6px;white-space:nowrap;\"><span style=\"font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--gray-5);\">Last Edited<\u002Fspan><span style=\"font-size:11px;color:var(--gray-8);font-family:var(--font-mono) icit, unticked consent moment, visually and logically separate from the purchase authorization. The consent records its own timestamp and scope, distinct from the order, and appears in account settings as an individually revocable item. Revocation removes the stored method immediately, including from any express-checkout configuration that depends on it.<br><b style=\"font-weight:600;color:var(--gray-10);display:inline-block;margin-top:7px;\">Behavior:<\u002Fb> the consent prompt appears at most once per card entry; declining stores nothing and does not re-prompt within the flow.<br><b style=\"font-weight:600;color:var(--gray-10);display:inline-block;margin-top:7px;\">Acceptance:<\u002Fb> no card is retained without a recorded consent event that is separate from the purchase record and independently revocable.<\u002Fp>\n                <div style=\"position:relative;display:flex;align-items:center;flex-wrap:wrap;gap:18px;row-gap:10px;margin-top:14px;min-height:30px;\"><span style=\"display:inline-flex;align-items:baseline;gap:6px;white-space:nowrap;\"><span style=\"font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--gray-5);\">Source<\u002Fspan><span style=\"font-size:11px;color:var(--gray-8);font-family:var(--font-mono);\">{{ metaSrc_s42 }}<\u002Fspan><\u002Fspan><span style=\"display:inline-flex;align-items:baseline;gap:6px;white-space:nowrap;\"><span style=\"font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--gray-5);\">Date Created<\u002Fspan><span style=\"font-size:11px;color:var(--gray-8);font-family:var(--font-mono);\">{{ metaDate_s42 }}<\u002Fspan><\u002Fspan><span style=\"display:inline-flex;align-items:baseline;gap:6px;white-space:nowrap;\"><span style=\"font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--gray-5);\">Last Edited<\u002Fspan><span style=\"font-size:11px;color:var(--gray-8);font-family:var(--font-mono);\">{{ metaEdited_s42 }}<\u002Fsp 2Fsvg><\u002Fsc-if>\n                <div style=\"position:relative;display:flex;align-items:center;gap:8px;margin-bottom:4px;\">\n                  {{ statusIcon_s43 }}<span style=\"font-size:10px;font-weight:700;color:var(--gray-7);font-family:var(--font-mono);white-space:nowrap;flex:none;\">4-3<\u002Fspan>\n                  <span style=\"font-size:13.5px;font-weight:600;color:{{ titleInk_s43 }};\">Payment method picker<\u002Fspan>\n                  <sc-if value=\"{{ notSettled_s43 }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:10px;font-weight:700;color:{{ focusNoteCol_s43 }};font-family:var(--font-mono);white-space:nowrap;flex:none;letter-spacing:0.02em;\">{{ noteText_s43 }}<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n                <p style=\"position:relative;margin:0;font-size:14px;line-height:1.75;color:{{ ink_s43 }};text-wrap:pretty;\">Stored methods list with the default first; add and remove without leaving checkout. Removal honors 4-2’s immediacy rule.<br><b style=\"font-weight:600;color:var(--gray-6);display:inline-block;margin-top:7px;\">Acceptance:<\u002Fb> adding a method mid-checkout returns the shopper to the payment step with the new method selected.<\u002Fp>\n                <div style=\"position:relative;display:flex;align-items:center;flex-wrap:wrap;gap:18px;row-gap:10px;margin-top:14px;min-height:30px;\"><span style=\"display:inline-flex;align-items:baseline;gap:6px;white-space:nowrap;\"><span style=\"font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--gray-5);\">Source<\u002Fspan><span style=\"font-size:11px;color:var(--gray-8);font-family:var(--font-mono);\">{{ metaSrc_s43 }}<\u002Fspan><\u002Fspan><span style=\"display:inline-flex;align-items:baseline;gap:6px;white-space:nowrap;\"><span style=\"font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--gray-5);\">Date Created<\u002Fspan><span style=\"font-size:11px;color:var(--gray-8);font-fam :absolute;left:-30px;right:-30px;top:1px;bottom:1px;background:var(--blau-1);opacity:0.5;\"><\u002Fdiv><\u002Fsc-if>\n                <sc-if value=\"{{ focus_s51 }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"position:absolute;left:-30px;top:5px;bottom:5px;width:3px;border-radius:0 2px 2px 0;background:{{ barCol_s51 }};\"><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ hasDot_s51 }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"position:absolute;left:-25px;top:15px;width:7px;height:7px;border-radius:50%;background:{{ dotCol_s51 }};\"><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ settledMargin_s51 }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--green-8)\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"position:absolute;left:-28px;top:11px;opacity:0.55;\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                <div style=\"position:relative;display:flex;align-items:center;gap:8px;margin-bottom:4px;\">\n                  {{ statusIcon_s51 }}<span style=\"font-size:10px;font-weight:700;color:var(--gray-7);font-family:var(--font-mono);white-space:nowrap;flex:none;\">5-1<\u002Fspan>\n                  <span style=\"font-size:13.5px;font-weight:600;color:{{ titleInk_s51 }};\">Refund method rules<\u002Fspan>\n                  <sc-if value=\"{{ notSettled_s51 }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:10px;font-weight:700;color:{{ focusNoteCol_s51 }};font-family:var(--font-mono);white-space:nowrap;flex:none;letter-spacing:0.02em;\">{{ noteText_s51 }}<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n                <p style=\"position:relative;margin:0;font-size:14px;line-height:1.75;color:{{ ink_s51 }};text-wrap:pretty;\">When a refund is due and the original payment method has expired or been removed, the shopper chooses the fallback at return time: store credit, applied immediately, or bank transfer within five business days. The choice is presented once, inside the return flow, with the original-method path shown first whenever that method remains chargeable. The shopper’s selection is recorded as the explicit exception basis the refund-method rule requires.<br><b style=\"font-weight:600;color:var(--gray-10);display:inline-block;margin-top:7px;\">States:<\u002Fb> when the original method is valid, no fallback choice appears — the original-method rule applies untouched; an abandoned fallback choice leaves the refund pending with the shopper notified, never silently rerouted.<br><b style=\"font-weight:600;color:var(--gray-10);display:inline-block;margin-top:7px;\">Acceptance:<\u002Fb> no refund is ever issued to a destination the shopper did not explicitly choose, and every fallback carries its recorded basis.<\u002Fp>\n                <div style=\"position:relative;display:flex;align-items:center;flex-wrap:wrap;gap:18px;row-gap:10px;margin-top:14px;min-height:30px;\"><span style=\"display:inline-flex;align-items:baseline;gap:6px;white-space:nowrap;\"><span style=\"font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--gray-5);\">Source<\u002Fspan><span style=\"font-size:11px;color:var(--gray-8);font-family:var(--font-mono);\">{{ metaSrc_s51 }}<\u002Fspan><\u002Fspan><span style=\"display:inline-flex;align-items:baseline;gap:6px;white-space:nowrap;\"><span style=\"font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--gray-5);\">Date Created<\u002Fspan><span style=\"font-size:11px;color:var(--gray-8);font-family:var(--font-mono);\">{{ metaDate_s51 }}<\u002Fspan><\u002Fspan><span style=\"display:inline-flex;align-items:baseline;gap:6px;white-space:nowrap;\"><span style=\"font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--gray-5);\">Last Edited<\u002Fspan><span style=\"font-size:11px;color:var(--gray-8);font-family:var(--font-mono);\">{{ metaEdited_s51 }}<\u002Fspan> stroke=\"var(--red-9)\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.3 3.9 1.8 18a1.8 1.8 0 0 0 1.5 2.7h17a1.8 1.8 0 0 0 1.5-2.7L13.7 3.9a1.8 1.8 0 0 0-3 0Z\"><\u002Fpath><path d=\"M12 9v4\"><\u002Fpath><path d=\"M12 17h.01\"><\u002Fpath><\u002Fsvg>\n                Escalated\n              <\u002Fspan>\n              <button onclick=\"{{ closeBench }}\" class=\"wb-btn\" style=\"width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:6px;color:var(--gray-6);\" style-hover=\"background:var(--surface-hover);color:var(--gray-9);\">\n                <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><path d=\"M6 6l12 12M18 6L6 18\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"height:1px;background:var(--border);margin:0 -36px 0;\"><\u002Fdiv>\n          <div style=\"position:relative;background:var(--gray-1);margin:0 -36px;padding:17px 36px 15px;\">\n            <p class=\"wbf\" style=\"margin:0;max-height:184px;overflow-y:auto;font-size:14px;line-height:1.62;color:var(--gray-9);text-wrap:pretty;user-select:text;\">When a refund is due and the original payment method has expired or been removed, the shopper chooses the fallback at return time: store credit, applied immediately, or bank transfer within five business days. The choice is presented once, inside the return flow, with the original-method path shown first whenever that method remains chargeable. The shopper’s selection is recorded as the explicit exception basis the refund-method rule requires. States: when the original method is valid, no fallback choice appears — the original-method rule applies untouched; an abandoned fallback choice leaves the refund pending with the shopper notified, never silently rerouted. Acceptance: no refund is ever issued to a destination the shopper did not explicitly choose, and every fallback carries its recorded basis.<\u002Fp>\n            <div style=\"height:1px;background:var(--border);margin:14px 0 12px;\"><\u002Fdiv>\n            <p class=\"wbf\" style=\"margin:0;max-height:96px;overflow-y:auto;font-size:14px;line-height:1.62;color:var(--gray-9);text-wrap:pretty;\"><span style=\"font-weight:700;color:var(--red-9);\">Conflict summary:<\u002Fspan> The actors deadlocked on refunds to expired payment methods — fidelity to the original-method rule versus a workable fallback. Three cycles narrowed the disagreement to the principle alone: a standing fallback path versus a per-case exception. Your decision is needed.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"height:1px;background:var(--border);margin:0 -36px 0;\"><\u002Fdiv>\n          <div style=\"display:flex;gap:14px;margin-top:18px;\">\n            <sc-for list=\"{{ opts }}\" as=\"opt\" hint-placeholder-count=\"3\">\n              <button class=\"wb-opt\" onclick=\"{{ opt.onSelect }}\" style=\"{{ opt.style }}\">\n                <sc-if value=\"{{ opt.isSystem }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;color:var(--gray-9);\"><rect x=\"2\" y=\"3\" width=\"20\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M8 21h8M12 17v4\"><\u002Fpath><\u002Fsvg><\u002Fsc-if><sc-if value=\"{{ opt.notSystem }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:5px;background:{{ opt.actorBg }};color:var(--bg-1);font-size:9.5px;font-weight:700;flex:none;box-shadow:inset 0 0 0 0.5px var(--border-faint);\">{{ opt.actorWho }}<\u002Fspan><\u002Fsc-if><span style=\"font-size:14px;color:var(--gray-9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;\">{{ opt.name }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <textarea class=\"wb-ta\" value=\"{{ text }}\" onchange=\"{{ onEdit }}\" placeholder=\"Select an option to draft from it OR click &quot;Approve&quot; to keep the existing snippet above OR click &quot;Rewrite&quot; to send back the snippet with a note on what to change.\" style=\"{{ boxStyle }}\"><\u002Ftextarea>\n          <div style=\"margin:14px -36px -30px;padding:14px 36px;background:var(--bg-2);border-top:1px solid var(--border);border-radius:0 0 16px 16px;display:flex;align-items:center;gap:10px;\">\n            <button onclick=\"{{ cancelL1 }}\" class=\"bg-btn bg-btn--ghost\">Cancel<\u002Fbutton>\n            <span style=\"flex:1;\"><\u002Fspan>\n            <button onclick=\"{{ openRewrite }}\" class=\"bg-btn bg-btn--secondary\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 2v6h6\"><\u002Fpath><path d=\"M21 12A9 9 0 0 0 6 5.3L3 8\"><\u002Fpath><path d=\"M21 22v-6h-6\"><\u002Fpath><path d=\"M3 12a9 9 0 0 0 15 6.7l3-2.7\"><\u002Fpath><\u002Fsvg>\n              Rewrite\n            <\u002Fbutton>\n            <button onclick=\"{{ closeBench }}\" class=\"bg-btn bg-btn--primary\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n              {{ approveLabel }}\n            <\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- L2 · Rewrite Note -->\n      <sc-if value=\"{{ isRewriteL2 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"bg-dialog__scrim\" onclick=\"{{ l2Back }}\">\n        <div class=\"bg-dialog\" onclick=\"{{ s \u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1512,&quot;height&quot;:940}}\">\nclass Component extends DCLogic {\n  state = { page: 'inbox', sel: null, ibSel: null, ibRail: false, ibRailTab: 'chat', railTab: 'glass', wbOpen: false, l2: null, benchSel: null, benchDrafts: {}, rail: false, role: 'pm', toc: true, activeSec: null, navCol: false, srcOpen: null, nodeOpen: {}, docView: 'document', tocExp: {} };\n\n  componentDidMount() {\n    const tip = document.createElement('div'); tip.id = 'ix-tip'; document.body.appendChild(tip); this._tip = tip;\n    const placeTip = (r, center) => { tip.classList.add('on'); requestAnimationFrame(() => { const tw = tip.offsetWidth, th = tip.offsetHeight; let left = center ? (r.left + r.width/2 - tw/2) : r.left; if (left + tw > window.innerWidth - 8) left = window.innerWidth - 8 - tw; tip.style.left = Math.max(8, left) + 'px'; let top = r.top - th - 6; if (top < 8) top = r.bottom + 6; tip.style.top = top + 'px'; }); };\n    this._onOver = (e) => {\n      const dt = e.target.closest && e.target.closest('[data-tip]');\n      if (dt) { tip.textContent = dt.getAttribute('data-tip'); placeTip(dt.getBoundingClientRect(), true); return; }\n      const el = e.target.closest && e.target.closest('.truncable'); if (!el) return; if (el.scrollWidth <= el.clientWidth + 1) return; tip.textContent = el.textContent; placeTip(el.getBoundingClientRect(), false);\n    };\n    this._onOut = (e) => { const el = e.target.closest && (e.target.closest('[data-tip]') || e.target.closest('.truncable')); if (el) this._tip.classList.remove('on'); };\n    document.addEventListener('mouseover', this._onOver);\n    document.addEventListener('mouseout', this._onOut);\n    let key = null;\n    try { key = new URLSearchParams(window.location.search).get('focus'); } catch (e) {}\n    if (!key) return;\n    const sec = (key && key[0] === 's') ? parseInt(key[1], 10) : null;\n    this.setState({ sel: key, rail: true, activeSec: sec, docView: 'document' });\n    // scroll the focused snippet into view; re-apply across frames so it\n    // converges after the (very tall) document finishes laying out\n    const settle = (tries) => {\n      const tray = this.trayRef.current;\n      const el = tray && tray.querySelector('#snip-' + key);\n      if (tray && el) {\n        const delta = el.getBoundingClientRect().top - tray.getBoundingClientRect().top - 120;\n        if (Math.abs(delta) > 2) tray.scrollTop += delta;\n      }\n      if (tries > 0) requestAnimationFrame(() => settle(tries - 1));\n    };\n    requestAnimationFrame(() => settle(40));\n  }\n\n  componentWillUnmount() {\n    if (this._onOver) document.removeEventListener('mouseover', this._onOver);\n    if (this._onOut) document.removeEventListener('mouseout', this._onOut);\n    if (this._tip) this._tip.remove();\n  }\n\n  openSnippet(key) {\n    const sec = (key && key[0] === 's') ? parseInt(key[1], 10) : null;\n    this.setState({ page: 'doc', sel: key, rail: true, activeSec: sec, docView: 'document' });\n    const settle = (tries) => {\n      const tray = this.trayRef.current;\n      const el = tray && tray.querySelector('#snip-' + key);\n      if (tray && el) { const delta = el.getBoundingClientRect().top - tray.getBoundingClientRect().top - 120; if (Math.abs(delta) > 2) tray.scrollTop += delta; }\n      if (tries > 0) requestAnimationFrame(() => settle(tries - 1));\n    };\n    requestAnimationFrame(() => settle(40));\n  }\n\n  data() {\n    const time = { green:{timeFg:'var(--green-9)',timeBg:'var(--green-1)'}, amber:{timeFg:'var(--amber-10)',timeBg:'var(--amber-1)'}, red:{timeFg:'var(--red-9)',timeBg:'var(--red-1)'} };\n    const agent = { authorBg:'var(--green-9)', authorFg:'#fff', author:'PM', authorName:'PM Actor' };\n    const pos = {\n      '51': { pm:'Wants a per-case exception, recorded each time it i  subject:'Card storage gated behind an explicit, unticked consent moment', lineage:'Checkout PRD · §4', created:'Feb 28', draft:'A shopper may store a card only through an explicit, unticked consent moment — separate from the purchase and individually revocable across all flows.', ...agent },\n      { id:'52', group:'rev', pri:'low', cyc:0, code:'5-2', tcol:'green', time:'6h', title:'Refund timeline display', subject:'Return window shown as days-remaining, per item, on the order page', lineage:'Checkout PRD · §5', created:'Mar 1', draft:'The 30-day return window renders on the order page per item, as days remaining rather than a date the shopper must compute.', ...agent },\n      { id:'53', group:'rev', pri:'med', cyc:2, code:'5-3', tcol:'amber', time:'2d', title:'Seller-exception messaging', subject:'Seller-narrowed return windows disclosed on the listing and at checkout', lineage:'Checkout PRD · §5', created:'Feb 27', draft:'Where a marketplace seller narrows the refund window, the narrowed window shows on the listing and again at checkout — never first revealed after purchase.', ...agent },\n      { id:'54', group:'rev', pri:'low', cyc:0, code:'5-4', tcol:'red', time:'5d', title:'Return initiation flow', subject:'Returns initiated from the order page in two steps', lineage:'Checkout PRD · §5', created:'Feb 26', draft:'Returns start from the order page in two steps — select items and reason, then receive the label. No in-policy return needs support.', ...agent },\n    ].map(d => {\n      const t = { green:{timeFg:'var(--green-9)',timeBg:'var(--green-1)'}, amber:{timeFg:'var(--amber-10)',timeBg:'var(--amber-1)'}, red:{timeFg:'var(--red-9)',timeBg:'var(--red-1)'} }[d.tcol];\n      return { ...d, ...t,\n        priIcon: this.cycIcon(d.cyc, d.group==='esc'),\n        loopIcon: this.loopIcon(d.cyc),\n        groupDot: d.group==='esc' ? 'var(--red-8)' : 'var(--amber-7)',\n        ...pos[d.id],\n        escTitle: d.group==='esc' ? 'Escalated — BA and PM did not agree' : 'Converged — BA and PM aligned',\n        rulingLead: d.group==='esc' ? 'No agreement reached — ' : 'Agreement reached — ',\n        rulingTail: d.group==='esc' ? 'ruling required' : 'ready to approve.',\n        boxBg: 'var(--blau-1)',\n        boxBar: d.group==='esc' ? 'var(--red-8)' : 'var(--amber-7)',\n        boxFg: d.group==='esc' ? 'var(--red-9)' : 'var(--amber-10)' };\n    });\n  }\n\n  loopIcon(cyc) {\n    const h = React.createElement;\n    const base = { viewBox:'0 0 24 24', fill:'none', strokeWidth:2, strokeLinecap:'round', strokeLinejoin:'round', stroke:'var(--gray-9)' };\n    const tip = cyc === 0 ? 'Clean run · no loops' : (cyc === 1 ? '1 negotiation loop' : cyc + ' negotiation loops');\n    const svg = (...kids) => h('svg', { ...base, width:15, height:15, 'data-tip':tip }, ...kids);\n    if (cyc === 0) return svg(h('circle',{key:1,cx:12,cy:12,r:10}), h('path',{key:2,d:'M8 12h8'}));\n    if (cyc === 1) return svg(h('path',{key:1,d:'M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8'}), h('path',{key:2,d:'M21 3v5h-5'}));\n    return svg(h('path',{key:1,d:'M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8'}), h('path',{key:2,d:'M21 3v5h-5'}), h('path',{key:3,d:'M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16'}), h('path',{key:4,d:'M8 16H3v5'}));\n  }\n\n  cycIcon(cyc, esc) {\n    const h = React.createElement;\n    const base = { viewBox:'0 0 24 24', fill:'none', strokeWidth:1.75, strokeLinecap:'round', strokeLinejoin:'round' };\n    if (esc) return h('svg', { ...base, width:16, height:16, stroke:'var(--red-9)', 'data-tip':'Escalated' },\n      h('path',{key:1,d:'M2 21a8 8 0 0 1 10.821-7.487'}),\n      h('path',{key:2,d:'M21.378 16.626a1 1 0 0 0-3.004-3.004l-4.01 4.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z'}),\n      h('circle',{key:3,cx:10,cy:8,r:5}));\n    return h('svg', { ...base, width:16, height:16, stroke:'var(--amber-10)', 'data-tip':'In review' },\n      h('circle',{key:1,cx:10,cy:8,r:5}),\n      h('path',{key:2,d:'M2 21a8 8 0 0 1 10.434-7.62'}),\n      h('circle',{key:3,cx:18,cy:18,r:3}),\n      h('path',{key:4,d:'m22 22-1.9-1.9'}));\n  }\n\n  benchDefs = {\n    A: \"Refunds return to the original payment method. When that method has expired or been removed, the refund is held pending and resolved through a support-mediated exception, with the shopper notified and each exception's basis explicitly recorded. Acceptance: no standing fallback path exists; every departure from the original method is an individually recorded exception.\",\n    B: \"Refunds are issued to the original payment method wherever it can still receive them. Where it cannot, the shopper's standing fallback \\u2014 chosen once at checkout, store credit or bank transfer \\u2014 applies automatically to every affected refund. Acceptance: the shopper's selection is honored without per-case review, keeping resolution immediate at the cost of a permanent fallback path.\",\n    C: \"Refunds attempt the original payment method first. Where it cannot receive them, the system descends a fixed hierarchy \\u2014 store credit, then bank transfer \\u2014 applying each tier in order and recording the basis at every step it takes. Acceptance: one deterministic, auditable path replaces both per-case handling and shopper choice; no fallback is ever ad hoc.\"\n  };\n  benchMeta = [\n    { key:'A', role:'BA', name:'Per-case exception' },\n    { key:'B', role:'PM', name:'Standing fallback' },\n    { key:'C', role:'System', name:'Tiered fallback', rec:true }\n  ];\n  benchSelect(k){ this.setState(s => ({ benchSel: s.benchSel === k ? null : k })); }\n  onBenchEdit = (e) => { const v = e.target.value; const k = this.state.benchSel; if(!k) return; this.setState(s => ({ benchDrafts: { ...s.benchDrafts, [k]: v } })); };\n\n  brd = {\n    '': 'The Checkout BRD in full \\u2014 every settled business decision governing the Checkout Rework, from which this PRD derives its requirements.',\n    '1-1': 'Guest checkout \\u2014 a shopper must be able to complete a purchase without creating an account, providing only the information fulfilment requires.',\n    '1-2': 'Post-purchase account \\u2014 after a successful purchase the shopper may be offered account creation that adopts the just-completed order.',\n    '1-3': 'Shopper data consent \\u2014 any storage of shopper data beyond the transaction requires explicit, separately recorded consent.',\n    '2-1': 'Delivery estimate at checkout \\u2014 a delivery estimate renders per shipment before payment is enabled; an honest service range may stand in, never a fabricated date.',\n    '3-1': 'Cart persistence \\u2014 a signed-in shopper\\u2019s cart, applied promotions included, persists and restores across devices.',\n    '3-2': 'Per-region pricing \\u2014 all monetary amounts render in the destination region\\u2019s currency and tax basis; no mixed-region display in any flow.',\n    '3-4': 'Saved for later \\u2014 shoppers may move items to a saved list excluded from cart totals and thresholds until restored.',\n    '4-1': 'One-step purchase \\u2014 returning shoppers with a stored method and default address may complete a purchase from a single confirming surface.',\n    '4-2': 'Stored payment methods \\u2014 shoppers may store, default, and remove payment methods, with removal taking effect immediately.',\n    '5-1': 'Refund window \\u2014 refunds are available within a 30-day window, surfaced to the shopper per item on the order page.',\n    '5-2': 'Marketplace-seller exceptions \\u2014 where a seller narrows the refund window, the narrowed window must be disclosed before purchase.',\n    '5-3': 'Refund method \\u2014 refunds return to the original payment method; any exception requires an explicit, recorded basis.',\n  };\n  trayRef = React.createRef();\n  brdRef = React.createRef();\n\n  statusSvg(st, tip) {\n    const h = React.createElement;\n    const base = { viewBox:'0 0 24 24', fill:'none', strokeWidth:1.75, strokeLinecap:'round', strokeLinejoin:'round', width:14, height:14, style:{flex:'none'} };\n    if (st === 'escalated') return h('svg', Object.assign({}, base, { stroke:'var(--red-9)', 'data-tip':tip||'Escalated' }), h('path',{key:1,d:'M2 21a8 8 0 0 1 10.821-7.487'}), h('path',{key:2,d:'M21.378 16.626a1 1 0 0 0-3.004-3.004l-4.01 4.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z'}), h('circle',{key:3,cx:10,cy:8,r:5}));\n    if (st === 'review') return h('svg', Object.assign({}, base, { stroke:'var(--amber-10)', 'data-tip':tip||'In review' }), h('circle',{key:1,cx:10,cy:8,r:5}), h('path',{key:2,d:'M2 21a8 8 0 0 1 10.434-7.62'}), h('circle',{key:3,cx:18,cy:18,r:3}), h('path',{key:4,d:'m22 22-1.9-1.9'}));\n    if (st === 'settled') return h('svg', Object.assign({}, base, { stroke:'var(--green-8)', 'data-tip':tip||'Settled', style:{flex:'none',opacity:0.5} }), h('path',{key:'a',d:'M2 21a8 8 0 0 1 13.292-6'}), h('circle',{key:'c',cx:10,cy:8,r:5}), h('path',{key:'k',d:'m16 19 2 2 4-4'}));\n    return null;\n  }\n\n  brdDoc = {\n    title: \"Checkout BRD\",\n    sections: [\n      { n: \"§1\", title: \"Account & Sign-in\", snips: [\n        { id: \"1-1\", title: \"Guest checkout\", st: \"settled\",\n          body: \"Shoppers must be able to complete a purchase without creating an account. Industry baskets are abandoned at forced-registration walls at well-documented rates, and our own funnel analysis attributes a material share of drop-off to the account step. The guest path collects only what fulfilment requires — delivery details and payment — and nothing else. Account creation may be offered, never required, and never as an interruption between cart and confirmation.\" },\n        { id: \"1-2\", title: \"Post-purchase account\", st: \"settled\",\n          body: \"A shopper who checked out as a guest must be able to create an account after the purchase completes, and that account must adopt the completed order — order history, delivery tracking, and any stored consent travel with it. The business intent is to convert guests into account holders at the moment of highest goodwill (a successful purchase) rather than the moment of highest friction (before payment). Declining the offer must carry no penalty and no repeated prompting within the same session.\" },\n        { id: \"1-3\", title: \"Shopper data consent\", st: \"settled\",\n          body: \"Personal data is stored only with the shopper's explicit consent, captured in a dedicated consent moment and recorded separately from acceptance of purchase terms. Consent bundled into terms-of-sale checkboxes does not satisfy this requirement and exposes the business to regulatory findings in our primary markets. The shopper must be able to view and withdraw each consent independently from account settings, and withdrawal must propagate to dependent features (for example, stored payment methods) rather than leaving them silently orphaned. Audit records must show, for every stored datum, which consent it rests on and when that consent was given.\" },\n      ] },\n      { n: \"§2\", title: \"Address & Delivery\", snips: [\n        { id: \"2-1\", title: \"Delivery estimate at checkout\", st: \"settled\",\n          body: \"Checkout must present an expected delivery date — not a generic range like \\u201c3–7 business days\\u201d but a date — before the shopper authorizes payment. The estimate is the promise the shopper is buying against, and presenting it after payment inverts the decision. Where multiple delivery speeds are offered, each option shows its own date and price side by side.\" },\n        { id: \"2-2\", title: \"Address validation\", st: \"settled\",\n          body: \"Delivery addresses are validated at the point of entry against an authoritative address service, so undeliverable or ambiguous addresses are caught before payment rather than surfacing as failed deliveries. Validation must assist, not obstruct: the shopper can override a non-matching address with an explicit confirmation, because new construction and rural formats legitimately fall outside reference data. Failed deliveries traced to unvalidated addresses are the single largest driver of our redelivery cost line, which is the business case for doing this at entry.\" },\n        { id: \"2-3\", title: \"Split shipments\", st: \"review\",\n          body: \"When items in one order ship from different locations, the order may arrive as separate deliveries. The shopper must be told this before paying — at minimum, which items arrive together and the expected date per shipment — and the order page must reflect per-shipment status afterward. The business accepts the additional carrier cost of split shipment where it materially improves the earliest delivery date, within margin guardrails owned by Operations; this document constrains only what the shopper is shown and when, not the routing economics.\" },\n      ] },\n      { n: \"§3\", title: \"Cart & Pricing\", snips: [\n        { id: \"3-1\", title: \"Cart persistence\", st: \"settled\",\n          body: \"A signed-in shopper's cart persists across sessions and devices. A cart built on a phone over lunch must be waiting in the desktop browser that evening. Persistence covers items, quantities, and applied promotions, with a retention window set by policy rather than by technical accident.\" },\n        { id: \"3-2\", title: \"Per-region pricing\", st: \"settled\",\n          body: \"Prices, taxes, and spend thresholds are maintained per region, and a shopper always sees their own region's values from first browse through confirmation. Mixed-region displays — a price browsed in one currency and confirmed in another — are not acceptable in any flow, including shared links and saved carts opened abroad. Region determination follows the shopper's delivery destination, not their network location, because the delivery destination is what determines the tax and threshold treatment actually applied.\" },\n        { id: \"3-3\", title: \"Free-shipping threshold\", st: \"escalated\",\n          body: \"Orders above a per-region spend threshold qualify for free standard shipping. The threshold is a merchandising lever — Finance sets it per region alongside the per-region pricing tables in 3-2, and it must be changeable seasonally without engineering involvement. The threshold applies to the order's merchandise subtotal after promotions and before taxes, because a threshold computed pre-promotion advertises a benefit many shoppers won't actually receive.\",\n          note: \"The authored deadlock: whether the threshold applies to wholesale-flagged accounts — the existing conflict trace's basis dissent, verbatim. Decision owed by Hatty Doran as BA.\" },\n        { id: \"3-4\", title: \"Saved for later\", st: \"settled\",\n          body: \"A shopper may move cart items to a persistent saved list. Saved items are excluded from the subtotal, from promotion math, and from the free-shipping threshold until moved back to the cart, so the cart's totals always describe what will actually be purchased.\" },\n      ] },\n      { n: \"§4\", title: \"Payment\", snips: [\n        { id: \"4-1\", title: \"One-step purchase\", st: \"settled\",\n          body: \"Returning shoppers with a stored payment method and a default address must be able to complete a purchase in a single confirming action. The business case is conversion on repeat purchases, where every additional step measurably sheds completed orders. The single step must still present the total, the method, and the destination — speed must not be achieved by hiding what the shopper is agreeing to.\" },\n        { id: \"4-2\", title: \"Stored payment methods\", st: \"settled\",\n          body: \"The platform may retain a shopper's payment method only with explicit consent, captured in its own consent moment and recorded separately from the purchase that occasioned it (see 1-3 for the consent framework this rests on). Storing a card because the shopper failed to notice a pre-ticked box is a regulatory exposure and a trust failure. Stored methods must be individually removable from settings, and removal takes effect immediately across all flows, including any in-flight one-step purchase configuration.\" },\n        { id: \"4-3\", title: \"Payment failure retries\", st: \"internal\",\n          body: \"How failed payments are retried, and when the shopper is interrupted versus when the system retries silently.\",\n          note: \"Actors mid-negotiation; dissent currently held on whether silent retries are permitted at all for card payments.\" },\n      ] },\n      { n: \"§5\", title: \"Returns & Refunds\", snips: [\n        { id: \"5-1\", title: \"Refund window\", st: \"settled\",\n          body: \"Shoppers may return items for a refund within 30 days of delivery — delivery, not purchase, because shipping time should never eat the shopper's decision window. The window is a platform-wide floor; nothing in this document permits narrowing it for first-party inventory.\" },\n        { id: \"5-2\", title: \"Marketplace-seller exceptions\", st: \"settled\",\n          body: \"Marketplace sellers may narrow the refund window for their listings, within a platform minimum that protects the shopper's baseline expectation. Any narrowed window must be displayed on the listing itself and again at checkout — never only in post-purchase documentation — because an exception the shopper learns about after paying is functionally a hidden term. The platform minimum, its review cadence, and the enforcement mechanism for sellers who misdeclare are owned by the Marketplace policy team; this requirement constrains disclosure and the floor, and establishes that the platform-wide 30-day window of 5-1 remains the default wherever a seller declares nothing.\" },\n        { id: \"5-3\", title: \"Refund method\", st: \"settled\",\n          body: \"Refunds return to the original payment method. Exceptions — store credit, bank transfer, or any substitute — require an explicit, recorded basis, because \\u201cwe refunded you, just somewhere you didn't expect\\u201d is among the highest-volume complaint categories in the industry. Where the original method is a third-party wallet with its own refund constraints, the platform honors the wallet's required path and records that basis.\" },\n      ] },\n    ],\n  };\n\n  brdInboxRows() {\n    const settled = this.statusSvg('settled');\n    const loop0 = this.loopIcon(0);\n    const t = { timeFg:'var(--green-9)', timeBg:'var(--green-1)' };\n    const rows = [\n      { id:'11', code:'1-1', title:'Guest checkout', subject:'Complete a purchase with no account — collect only what fulfilment requires', lineage:'Checkout BRD · §1', created:'Mar 30', time:'30d',\n        draft:'Shoppers must be able to complete a purchase without creating an account. The guest path collects only what fulfilment requires — delivery details and payment — and nothing else.',\n        pm:'Account creation is offered after the purchase, never as an interruption before it.', ba:'The guest path must collect nothing beyond delivery and payment.' },\n      { id:'21', code:'2-1', title:'Delivery estimate at checkout', subject:'Show an expected delivery date before the shopper authorizes payment', lineage:'Checkout BRD · §2', created:'Mar 30', time:'30d',\n        draft:'Checkout must present an expected delivery date — not a generic range but a date — before the shopper authorizes payment. The estimate is the promise the shopper is buying against.',\n        pm:'Each delivery speed shows its own date and price side by side.', ba:'The date appears before payment, never after.' },\n      { id:'31', code:'3-1', title:'Cart persistence', subject:'A signed-in cart persists across sessions and devices', lineage:'Checkout BRD · §3', created:'Mar 30', time:'30d',\n        draft:'A signed-in shopper\\u2019s cart persists across sessions and devices, covering items, quantities, and applied p
